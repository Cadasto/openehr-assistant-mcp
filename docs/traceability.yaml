# traceability.yaml — machine-readable REQ → code → test → decision map.
# One record per requirement; this is an INDEX and carries NO normative prose
# (that lives in docs/requirements.md). Validated against the working tree by
# `make spec-check` (src/Sdd/SpecCheck.php). The human-readable rendering is
# docs/traceability.md; the id set here MUST match it and requirements.md.
#
# Fields: id, title, canonical (owning doc), status (draft|stable|deprecated),
# implementation (planned|partial|landed|deferred), packages[], tests[],
# adr[] (ADR numbers under docs/decisions/), plans[], verification (free text).
# Paths may be globs; a glob must match at least one file. status `draft` is
# binding now — pre-1.0 wording may still change (see sdd-methodology §6).
requirements:
  - id: REQ-F1
    title: CKM archetype/template search & get
    canonical: docs/requirements.md
    status: draft
    implementation: landed
    packages: [src/Tools/CkmService.php, src/Apis/CkmClient.php]
    tests: [tests/Tools/CkmServiceTest.php, tests/Clients/CkmClientTest.php]
    adr: ["0002"]

