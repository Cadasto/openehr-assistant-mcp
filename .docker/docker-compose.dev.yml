services:

  app:
    image: cadasto/openehr-assistant-mcp-dev:latest
    build:
      context: ..
      dockerfile: .docker/Dockerfile
      target: development
    tty: true
    volumes:
      - ../:/app
      - npm-cache:/home/node/.npm
    command: ["node", "--import", "tsx/esm", "src/index.ts"]

  ingress:
    ports:
      - "8343:8343"
      - "80:80"
      - "443:443"
      - "443:443/udp"

volumes:
  npm-cache:
