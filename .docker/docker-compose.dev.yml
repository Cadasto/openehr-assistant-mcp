services:

  app:
    image: cadasto/openehr-assistant-mcp-dev:latest
    build:
      context: ..
      dockerfile: .docker/Dockerfile
      target: development
    tty: true
    volumes:
      - ../:/app
      - composer-cache:/data/.cache/composer

  ingress:
    ports:
      - "8343:8343"
      - "80:80"
      - "443:443"
      - "443:443/udp"

volumes:
  composer-cache:
