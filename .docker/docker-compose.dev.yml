services:

  # Node + curl for MCP conformance (npx) and scripts. Use: docker compose run --rm node npx ...
  node:
    image: cadasto/openehr-assistant-mcp-node:latest
    build:
      context: ..
      dockerfile: .docker/Dockerfile
      target: node
    working_dir: /app
    volumes:
      - ../:/app

  app:
    image: cadasto/openehr-assistant-mcp-dev:latest
    build:
      context: ..
      dockerfile: .docker/Dockerfile
      target: development
    tty: true
    volumes:
      - ../:/app
      - composer-cache:/data/.cache/composer

  ingress:
    ports:
      - "8343:8343"
      - "80:80"
      - "443:443"
      - "443:443/udp"

volumes:
  composer-cache:
